variables:
  projectUser: vision
  projectPath: /datas/$projectUser/
  server: lab-server
  buildDir: build

stages:
  - build
  - deploy
  - showlog

build:
  stage: build
  variables:
    GIT_STRATEGY: clone
  script:
    - node -v
    - npm -v
    - npm install
    - CI=false npm run build
  artifacts:
    expire_in: 7 days
    paths:
      - $buildDir/
  tags:
    - $server
  only:
    - tags

deploy:
  stage: deploy
  variables:
    GIT_STRATEGY: none
  script:
    - sudo mkdir -p "$projectPath"
    - sudo cp -r "$buildDir"/. "$projectPath"
    - sudo chown -R "$projectUser":"$projectUser" "$projectPath"
  tags:
    - $server
  only:
    - tags

showlog:
  stage: showlog
  variables:
    GIT_STRATEGY: none
  script:
    - echo "Frontend static files deployed to $projectPath"
    - sudo ls -lah "$projectPath"
  tags:
    - $server
  only:
    - tags
