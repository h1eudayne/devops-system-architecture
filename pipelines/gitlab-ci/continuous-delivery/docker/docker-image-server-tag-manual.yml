variables:
  REGISTRY_PROJECT: your-registry-project
  # Image format: registry/project/app:tag_shortsha
  DOCKER_IMAGE: ${REGISTRY_URL}/${REGISTRY_PROJECT}/${CI_PROJECT_NAME}:${CI_COMMIT_TAG}_${CI_COMMIT_SHORT_SHA}
  DOCKER_CONTAINER: ${CI_PROJECT_NAME}
  DOCKERFILE_PATH: Dockerfile
  DOCKER_BUILD_CONTEXT: .
  HOST_PORT: "8080"
  CONTAINER_PORT: "8080"
  DOCKER_RUN_OPTIONS: --restart unless-stopped
  SERVER: lab-server

stages:
  - buildandpush
  - deploy
  - showlog

build:
  stage: buildandpush
  variables:
    GIT_STRATEGY: clone
  before_script:
    - echo "${REGISTRY_PASSWORD}" | docker login ${REGISTRY_URL} -u ${REGISTRY_USER} --password-stdin
  script:
    - docker build -f ${DOCKERFILE_PATH} -t ${DOCKER_IMAGE} ${DOCKER_BUILD_CONTEXT}
    - docker push ${DOCKER_IMAGE}
  tags:
    - $SERVER
  only:
    - tags

deploy:
  stage: deploy
  variables:
    GIT_STRATEGY: none
  when: manual
  before_script:
    - echo "${REGISTRY_PASSWORD}" | docker login ${REGISTRY_URL} -u ${REGISTRY_USER} --password-stdin
  script:
    - docker pull ${DOCKER_IMAGE}
    - docker rm -f ${DOCKER_CONTAINER} || true
    - docker run --name ${DOCKER_CONTAINER} -dp ${HOST_PORT}:${CONTAINER_PORT} ${DOCKER_RUN_OPTIONS} ${DOCKER_IMAGE}
  tags:
    - $SERVER
  only:
    - tags

showlog:
  stage: showlog
  variables:
    GIT_STRATEGY: none
  when: manual
  script:
    - docker logs --tail 300 ${DOCKER_CONTAINER}
  tags:
    - $SERVER
  only:
    - tags
