  - id: shared-k8s-db-nfs-setup-guide
    category: kubernetes
    platform: ubuntu
    file: on-premise/setup/kubernetes/setup-db-nfs-guide.md
    maturity: draft
    notes: >
      Huong dan tung buoc trien khai database MariaDB tren K8s, bao gom
