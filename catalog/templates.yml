templates:
  - id: gitlab-java-maven-jar-server-tag
    provider: gitlab-ci
    delivery_model: continuous-deployment
    language: java
    scenario: maven-jar-server-tag
    file: pipelines/gitlab-ci/continuous-deployment/java/maven-jar-server-tag.yml
    trigger: tags
    deployment_target: linux-server
    maturity: adapted
    notes: >
      Pipeline build bang Maven, copy JAR len server local path,
      restart ung dung bang nohup va xem log sau deploy.

  - id: gitlab-react-static-server-tag
    provider: gitlab-ci
    delivery_model: continuous-deployment
    language: react
    scenario: npm-static-server-tag
    file: pipelines/gitlab-ci/continuous-deployment/react/npm-static-server-tag.yml
    trigger: tags
    deployment_target: linux-server
    maturity: draft
    notes: >
      Pipeline build React app bang npm, copy thu muc build len server Linux
      va hien thi danh sach file sau khi deploy.

  - id: gitlab-react-static-server-tag-manual
    provider: gitlab-ci
    delivery_model: continuous-delivery
    language: react
    scenario: npm-static-server-tag-manual
    file: pipelines/gitlab-ci/continuous-delivery/react/npm-static-server-tag-manual.yml
    trigger: tags
    deployment_target: linux-server
    maturity: draft
    notes: >
      Pipeline build React app bang npm, giu buoc deploy o che do manual gate
      truoc khi copy file build len server Linux.

  - id: gitlab-docker-image-server-tag-manual
    provider: gitlab-ci
    delivery_model: continuous-delivery
    language: docker
    scenario: docker-image-server-tag-manual
    file: pipelines/gitlab-ci/continuous-delivery/docker/docker-image-server-tag-manual.yml
    trigger: tags
    deployment_target: docker-host
    maturity: adapted
    notes: >
      Pipeline build Docker image, push len private registry, giu buoc deploy
      container o che do manual va co job xem log sau deploy.

shared:
  - id: shared-k8s-prepare-all-nodes
    category: kubernetes
    platform: ubuntu
    file: on-premise/scripts/kubernetes/01-prepare-all-nodes.sh.example
    maturity: draft
    notes: >
      Bash script chuan bi tat ca node cho cum K8s on-premise: cau hinh hosts,
      tat swap, kernel module, containerd, kubelet/kubeadm/kubectl v1.30.

  - id: shared-k8s-init-single-master
    category: kubernetes
    platform: ubuntu
    file: on-premise/scripts/kubernetes/02-init-single-master.sh.example
    maturity: draft
    notes: >
      Khoi tao cum K8s mo hinh 1 master + 2 worker voi Calico CNI.

  - id: shared-k8s-init-ha-master
    category: kubernetes
    platform: ubuntu
    file: on-premise/scripts/kubernetes/03-init-ha-master.sh.example
    maturity: draft
    notes: >
      Khoi tao cum K8s mo hinh 3 master HA voi control-plane-endpoint
      va upload-certs, su dung Calico CNI.

  - id: shared-k8s-join-worker
    category: kubernetes
    platform: ubuntu
    file: on-premise/scripts/kubernetes/04-join-worker.sh.example
    maturity: draft
    notes: >
      Join worker node vao cum K8s (mo hinh 1 master + 2 worker).

  - id: shared-k8s-join-control-plane
    category: kubernetes
    platform: ubuntu
    file: on-premise/scripts/kubernetes/05-join-control-plane.sh.example
    maturity: draft
    notes: >
      Join control-plane node bo sung vao cum K8s HA (mo hinh 3 master).

  - id: shared-k8s-reset-cluster
    category: kubernetes
    platform: ubuntu
    file: on-premise/scripts/kubernetes/06-reset-cluster.sh.example
    maturity: draft
    notes: >
      Reset cum K8s de cai lai tu dau: kubeadm reset, xoa etcd va manifests.

  - id: shared-k8s-metrics-server
    category: kubernetes
    platform: ubuntu
    file: on-premise/scripts/metrics-server/install-metrics-server.sh.example
    maturity: draft
    notes: >
      Bash script cai dat Metrics Server cho Kubernetes su dung Helm,
      ho tro cau hinh bo qua xac thuc TLS doi voi certificate tu ky.

  - id: shared-k8s-hpa-setup-guide
    category: kubernetes
    platform: ubuntu
    file: on-premise/setup/kubernetes/setup-hpa-guide.md
    maturity: draft
    notes: >
      Huong dan chi tiet cach cai dat Metrics Server, fix loi tren Rancher
      va cau hinh HPA cho cum Kubernetes.

  - id: shared-nfs-server-readme
    category: storage
    platform: ubuntu
    file: on-premise/setup/nfs/nfs-server-guide.md
    maturity: draft
    notes: >
      Huong dan chi tiet cach cai dat, cau hinh va bao mat NFS Server
      tren Ubuntu (database-server).

  - id: shared-nfs-server-install
    category: storage
    platform: ubuntu
    file: on-premise/scripts/nfs/install-nfs-server.sh.example
    maturity: draft
    notes: >
      Bash script tu dong cai dat nfs-kernel-server, khoi tao thu muc chia se
      va cau hinh firewall UFW tren Ubuntu.

  - id: shared-nfs-client-readme
    category: storage
    platform: ubuntu
    file: on-premise/setup/nfs/nfs-client-guide.md
    maturity: draft
    notes: >
      Huong dan chi tiet cach cai dat va kiem tra ket noi NFS Client
      tren cac node Kubernetes (Ubuntu).

  - id: shared-nfs-client-install
    category: storage
    platform: ubuntu
    file: on-premise/scripts/nfs/install-nfs-client.sh.example
    maturity: draft
    notes: >
      Bash script tu dong cai dat nfs-common, kiem tra cong ket noi 2049
      va thuc hien mount test tren cac node client.

  - id: shared-k8s-nfs-setup-guide
    category: kubernetes
    platform: ubuntu
    file: on-premise/setup/kubernetes/setup-nfs-guide.md
    maturity: draft
    notes: >
      Huong dan toan dien ve kien truc, luu do hoat dong va cac buoc trien khai
