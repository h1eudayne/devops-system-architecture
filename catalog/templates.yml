  - id: shared-k8s-db-nfs-workflow
    category: kubernetes
    platform: ubuntu
    file: on-premise/workflow/kubernetes/k8s-mariadb-nfs-import.md
    maturity: draft
    notes: >
      Quy trinh nap du lieu SQL qua NFS va ket noi Backend qua ClusterIP (Phuong phap toi uu).

  - id: shared-k8s-redis-sentinel-setup-guide
    category: kubernetes
    platform: ubuntu
    file: on-premise/setup/kubernetes/setup-redis-sentinel-guide.md
    maturity: draft
    notes: >
      Huong dan tung buoc trien khai Redis Sentinel HA tren K8s, bao gom
      cau hinh NFS Server, PV/PVC, Helm values va kiem tra ket noi qua ClusterIP.

  - id: shared-k8s-uptime-kuma-setup-script
    category: kubernetes
    platform: ubuntu
    file: on-premise/kubernetes/uptime-kuma/setup-uptime-kuma.sh.example
    maturity: draft
    notes: >
      Bash script tu dong trien khai Uptime Kuma tren Kubernetes tu Namespace,
      PV/PVC, Helm values va Ingress.

kubernetes:
  - id: k8s-namespace-template
    kind: Namespace
    file: on-premise/kubernetes/namespace.yml.example
    maturity: draft
    notes: >
      Template tao Namespace cho ung dung. Thay <APP_NAME> bang ten thuc te.

  - id: k8s-pod-template
    kind: Pod
    file: on-premise/kubernetes/pod.yml.example
    maturity: draft
    notes: >
      Template tao Pod co resource limits. Thay <APP_NAME>, <NAMESPACE>,
      <DOCKER_IMAGE>, <CONTAINER_PORT> bang gia tri thuc te.

  - id: k8s-pod-nfs-template
    kind: Pod
    file: on-premise/kubernetes/pod-nfs.yml.example
    maturity: draft
    notes: >
      Template tao Pod Nginx mount PersistentVolumeClaim (PVC)
      su dung NFS Storage.

  - id: k8s-statefulset-mariadb-template
    kind: StatefulSet
    file: on-premise/kubernetes/statefulset/mariadb-statefulset.yml.example
    maturity: draft
    notes: >
      Template tao StatefulSet MariaDB mount PersistentVolumeClaim (PVC)
      su dung NFS Storage voi fsGroup duoc thiet lap la 65534.

  - id: k8s-service-mariadb-template
    kind: Service
    file: on-premise/kubernetes/service/mariadb-service.yml.example
    maturity: draft
    notes: >
      Template tao Service cho MariaDB ho tro ca 2 cach cau hinh:
      ClusterIP (truy cap noi bo) va NodePort (expose cong 31306).

  - id: k8s-fullstack-rolling-clusterip-ingress
    kind: Deployment+Service+Ingress
    file: on-premise/kubernetes/full-stack/fullstack-rolling-clusterip-ingress.yml.example
    maturity: draft
    notes: >
      Template gom day du Deployment (RollingUpdate) + Service (ClusterIP) +
      Ingress (Nginx) trong 1 file. Thay <APP_NAME>, <NAMESPACE>, <DOCKER_IMAGE>,
      <CONTAINER_PORT>, <REPLICAS>, <DOMAIN> bang gia tri thuc te.
      Co san phan resource limits, health check, TLS de bat khi can.

  - id: k8s-hpa-template
    kind: HorizontalPodAutoscaler
    file: on-premise/kubernetes/hpa/hpa.yml.example
    maturity: draft
    notes: >
      Template cau hinh HorizontalPodAutoscaler (HPA) theo API autoscaling/v2,
      tu dong co gian so pod dua tren nguong tai nguyen CPU va Memory.

  - id: k8s-storageclass-nfs-template
    kind: StorageClass
    file: on-premise/kubernetes/storage/storageclass.yml.example
    maturity: draft
    notes: >
      Template cau hinh StorageClass su dung provisioner kubernetes.io/no-provisioner
      cho NFS hoac local storage voi volumeBindingMode WaitForFirstConsumer.

  - id: k8s-pv-nfs-template
    kind: PersistentVolume
    file: on-premise/kubernetes/storage/pv.yml.example
    maturity: draft
    notes: >
      Template cau hinh PersistentVolume (PV) thu cong su dung NFS Storage
      cho moi truong on-premise.

  - id: k8s-pvc-nfs-template
    kind: PersistentVolumeClaim
    file: on-premise/kubernetes/storage/pvc.yml.example
    maturity: draft
    notes: >
      Template cau hinh PersistentVolumeClaim (PVC) su dung NFS Storage
      cho cac ung dung trong namespace.

  - id: k8s-redis-pv-pvc-template
    kind: PersistentVolume+PersistentVolumeClaim
    file: on-premise/kubernetes/storage/redis-pv-pvc.yml.example
    maturity: draft
    notes: >
      Template cau hinh PersistentVolume (PV) va PersistentVolumeClaim (PVC)
      su dung NFS Storage cho ung dung Redis trong namespace architecture.

  - id: k8s-uptime-kuma-pv-pvc-template
    kind: PersistentVolume+PersistentVolumeClaim
    file: on-premise/kubernetes/storage/uptime-kuma-pv-pvc.yml.example
    maturity: draft
    notes: >
      Template cau hinh PersistentVolume (PV) va PersistentVolumeClaim (PVC)
      su dung NFS Storage cho ung dung Uptime Kuma trong namespace monitoring.

  - id: k8s-redis-helm-values-template
    kind: HelmValues
    file: on-premise/kubernetes/redis/values.yml.example
    maturity: draft
    notes: >
      Template cau hinh values.yaml de cai dat Redis Replication + Sentinel
      su dung Helm Chart Bitnami tren Kubernetes.

  - id: k8s-uptime-kuma-helm-values-template
    kind: HelmValues
    file: on-premise/kubernetes/uptime-kuma/values.yml.example
    maturity: draft
    notes: >
      Template cau hinh values.yaml de cai dat Uptime Kuma su dung existingClaim PVC.

  - id: k8s-uptime-kuma-ingress-template
    kind: Ingress
    file: on-premise/kubernetes/uptime-kuma/ingress.yml.example
    maturity: draft
    notes: >
      Template cau hinh Ingress cho Uptime Kuma truy cap qua ten mien uptime.devops.hieuduyne.tech.






